name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Updating to version $VERSION"

      - name: Download release assets and compute checksums
        id: checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_URL="https://github.com/kedoco/nix-pipe-tools/releases/download/v${VERSION}"

          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            FILE="nix-pipe-tools-${target}.tar.gz"
            echo "Downloading ${FILE}..."
            curl -fSL -o "$FILE" "${BASE_URL}/${FILE}"
            SHA=$(sha256sum "$FILE" | awk '{print $1}')
            # Convert target to env-safe name
            ENV_NAME=$(echo "$target" | tr '-' '_')
            echo "sha_${ENV_NAME}=$SHA" >> "$GITHUB_OUTPUT"
            echo "  ${target}: ${SHA}"
          done

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_AARCH64_DARWIN="${{ steps.checksums.outputs.sha_aarch64_apple_darwin }}"
          SHA_X86_64_DARWIN="${{ steps.checksums.outputs.sha_x86_64_apple_darwin }}"
          SHA_AARCH64_LINUX="${{ steps.checksums.outputs.sha_aarch64_unknown_linux_gnu }}"
          SHA_X86_64_LINUX="${{ steps.checksums.outputs.sha_x86_64_unknown_linux_gnu }}"

          cat > Formula/nix-pipe-tools.rb << 'RUBY'
          class NixPipeTools < Formula
            desc "Small, composable Unix utilities: memo, tap, prv, cel, when"
            homepage "https://github.com/kedoco/nix-pipe-tools"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/kedoco/nix-pipe-tools/releases/download/v#{version}/nix-pipe-tools-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_AARCH64_DARWIN_PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/kedoco/nix-pipe-tools/releases/download/v#{version}/nix-pipe-tools-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_X86_64_DARWIN_PLACEHOLDER"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/kedoco/nix-pipe-tools/releases/download/v#{version}/nix-pipe-tools-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_AARCH64_LINUX_PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/kedoco/nix-pipe-tools/releases/download/v#{version}/nix-pipe-tools-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_X86_64_LINUX_PLACEHOLDER"
              end
            end

            def install
              bin.install "memo"
              bin.install "tap"
              bin.install "prv"
              bin.install "cel"
              bin.install "when"
            end

            test do
              assert_match "memo", shell_output("#{bin}/memo --help")
              assert_match "tap", shell_output("#{bin}/tap --help")
              assert_match "cel", shell_output("#{bin}/cel --help")
              assert_match "when", shell_output("#{bin}/when now")
            end
          end
          RUBY

          # Strip leading whitespace from heredoc
          sed -i 's/^          //' Formula/nix-pipe-tools.rb

          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" Formula/nix-pipe-tools.rb
          sed -i "s/SHA_AARCH64_DARWIN_PLACEHOLDER/${SHA_AARCH64_DARWIN}/" Formula/nix-pipe-tools.rb
          sed -i "s/SHA_X86_64_DARWIN_PLACEHOLDER/${SHA_X86_64_DARWIN}/" Formula/nix-pipe-tools.rb
          sed -i "s/SHA_AARCH64_LINUX_PLACEHOLDER/${SHA_AARCH64_LINUX}/" Formula/nix-pipe-tools.rb
          sed -i "s/SHA_X86_64_LINUX_PLACEHOLDER/${SHA_X86_64_LINUX}/" Formula/nix-pipe-tools.rb

          echo "Updated formula:"
          cat Formula/nix-pipe-tools.rb

      - name: Commit and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/nix-pipe-tools.rb
          git commit -m "Update nix-pipe-tools to ${VERSION}"
          git push

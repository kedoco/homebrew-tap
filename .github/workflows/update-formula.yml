name: Update Formulas

on:
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Updating to version $VERSION"

      - name: Download release assets and compute checksums
        id: checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_URL="https://github.com/kedoco/nix-pipe-tools/releases/download/v${VERSION}"

          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            FILE="nix-pipe-tools-${target}.tar.gz"
            echo "Downloading ${FILE}..."
            curl -fSL -o "$FILE" "${BASE_URL}/${FILE}"
            SHA=$(sha256sum "$FILE" | awk '{print $1}')
            ENV_NAME=$(echo "$target" | tr '-' '_')
            echo "sha_${ENV_NAME}=$SHA" >> "$GITHUB_OUTPUT"
            echo "  ${target}: ${SHA}"
          done

      - name: Update formulas
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_AARCH64_DARWIN="${{ steps.checksums.outputs.sha_aarch64_apple_darwin }}"
          SHA_X86_64_DARWIN="${{ steps.checksums.outputs.sha_x86_64_apple_darwin }}"
          SHA_AARCH64_LINUX="${{ steps.checksums.outputs.sha_aarch64_unknown_linux_gnu }}"
          SHA_X86_64_LINUX="${{ steps.checksums.outputs.sha_x86_64_unknown_linux_gnu }}"

          for formula in Formula/*.rb; do
            sed -i "s/version \".*\"/version \"${VERSION}\"/" "$formula"
            # Each target appears once per formula, match by the tarball name
            sed -i "/aarch64-apple-darwin/{n;s/sha256 \".*\"/sha256 \"${SHA_AARCH64_DARWIN}\"/}" "$formula"
            sed -i "/x86_64-apple-darwin/{n;s/sha256 \".*\"/sha256 \"${SHA_X86_64_DARWIN}\"/}" "$formula"
            sed -i "/aarch64-unknown-linux-gnu/{n;s/sha256 \".*\"/sha256 \"${SHA_AARCH64_LINUX}\"/}" "$formula"
            sed -i "/x86_64-unknown-linux-gnu/{n;s/sha256 \".*\"/sha256 \"${SHA_X86_64_LINUX}\"/}" "$formula"
            echo "Updated $(basename "$formula")"
          done

      - name: Commit and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git commit -m "Update nix-pipe-tools formulas to ${VERSION}"
          git push
